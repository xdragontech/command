openapi: 3.1.0
info:
  title: Command Public API
  version: 0.1.0
  summary: Initial public-site integration contract for the reusable Command backoffice.
  description: |
    This is the initial external API contract that brand-specific public websites will consume
    through a server-side BFF/proxy. It is intentionally limited to the current live needs:
    external auth, account access, password reset, brand-scoped resource feeds, and the current
    public contact/chat service flows. It now also includes consent-gated first-party website
    analytics ingestion for branded public sites.
servers:
  - url: https://command.example.com
    description: Example Command install base URL
tags:
  - name: Auth
    description: External user authentication and session lifecycle
  - name: Account
    description: Authenticated external account profile operations
  - name: Resources
    description: Authenticated brand-scoped prompt and guide feeds
  - name: Scheduling
    description: Integration-authenticated published schedule feeds for public websites
  - name: Services
    description: Public website service flows such as contact and chat lead intake
  - name: Analytics
    description: Consent-gated first-party website analytics ingestion for branded public sites
security:
  - IntegrationKeyAuth: []
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new external account
      description: |
        Creates a brand-scoped external account for the integration's brand context and starts
        the email-verification flow. This endpoint is called by the public-site BFF, not directly
        by the browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration accepted and verification is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate an external user
      description: |
        Authenticates the external user and returns an opaque Command session token for the BFF to
        store and forward on subsequent requests. The browser should not receive or manage the raw
        Command session token directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current external session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/session:
    get:
      tags: [Auth]
      summary: Inspect the current external session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify an external account email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Start password-reset flow
      description: |
        Accepts an email address and triggers the brand-scoped password-reset flow. The response is
        intentionally generic to avoid account enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordForgotRequest'
      responses:
        '202':
          description: Password-reset request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
  /v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Complete password-reset flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/account/me:
    get:
      tags: [Account]
      summary: Fetch the current external account
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current external account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Account]
      summary: Update the current external account
      description: |
        Initial v1 scope is intentionally narrow: display-name updates only. Email change,
        password change, and social-account linking are explicitly deferred.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Updated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/resources/prompts:
    get:
      tags: [Resources]
      summary: List brand-scoped prompt resources
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: category
          schema:
            type: string
          description: Exact category filter
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Prompt feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/resources/guides:
    get:
      tags: [Resources]
      summary: List brand-scoped guide resources
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: category
          schema:
            type: string
          description: Exact category filter
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Guide feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/resources/guides/{slug}:
    get:
      tags: [Resources]
      summary: Fetch a single guide by slug
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guide detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/schedule/calendar:
    get:
      tags: [Scheduling]
      summary: List published schedule entries for calendar rendering
      description: |
        Returns published schedule entries for the integration's brand context. This endpoint is
        integration-authenticated but does not require an end-user session because the returned
        data is intended for public website rendering.
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Inclusive start date for the requested schedule range.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Inclusive end date for the requested schedule range.
        - in: query
          name: occurrenceDate
          schema:
            type: string
            format: date
          description: Exact occurrence date shortcut.
        - in: query
          name: eventSeries
          schema:
            type: string
          description: Exact event-series slug or name filter.
        - in: query
          name: participantType
          schema:
            type: string
            enum: [ENTERTAINMENT, FOOD_VENDOR, MARKET_VENDOR]
        - in: query
          name: resource
          schema:
            type: string
          description: Exact resource slug or name filter.
        - in: query
          name: location
          schema:
            type: string
          description: Alias for the resource filter.
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [STAGE, FOOD_SPOT, MARKET_SPOT, OTHER]
        - in: query
          name: sequence
          schema:
            type: integer
            minimum: 1
          description: Entertainment sequence filter derived from time order within a resource/day.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across titles, participants, event series, and locations.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 300
      responses:
        '200':
          description: Calendar feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleCalendarResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/schedule/list:
    get:
      tags: [Scheduling]
      summary: List published schedule entries for public listing UIs
      description: |
        Returns published schedule entries in list form for the integration's brand context. This
        endpoint is integration-authenticated but does not require an end-user session.
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Exact occurrence date shortcut.
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Inclusive start date for the requested schedule range.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Inclusive end date for the requested schedule range.
        - in: query
          name: occurrenceDate
          schema:
            type: string
            format: date
          description: Alias for exact occurrence date filtering.
        - in: query
          name: eventSeries
          schema:
            type: string
          description: Exact event-series slug or name filter.
        - in: query
          name: participantType
          schema:
            type: string
            enum: [ENTERTAINMENT, FOOD_VENDOR, MARKET_VENDOR]
        - in: query
          name: resource
          schema:
            type: string
          description: Exact resource slug or name filter.
        - in: query
          name: location
          schema:
            type: string
          description: Alias for the resource filter.
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [STAGE, FOOD_SPOT, MARKET_SPOT, OTHER]
        - in: query
          name: sequence
          schema:
            type: integer
            minimum: 1
          description: Entertainment sequence filter derived from time order within a resource/day.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across titles, participants, event series, and locations.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Schedule listing feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/contact:
    post:
      tags: [Services]
      summary: Submit a public website contact request
      description: |
        Accepts a public contact form submission, writes lead records, and attempts brand-scoped
        notification delivery. This endpoint is integration-authenticated but does not require an
        end-user session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '200':
          description: Contact request accepted and notification sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '202':
          description: Contact request accepted but notification deferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/chat:
    post:
      tags: [Services]
      summary: Execute the public website chat flow
      description: |
        Processes the current conversation turn, applies lead-capture rules, and optionally sends
        brand-scoped notification email when enough follow-up data has been collected. This
        endpoint is integration-authenticated but does not require an end-user session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat turn completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/analytics/collect:
    post:
      tags: [Analytics]
      summary: Ingest a consented first-party website analytics batch
      description: |
        Accepts a consented analytics event batch from the public-site BFF. Browsers do not call
        this endpoint directly. The BFF must forward the trusted website session identifier and
        the original client identity captured at the first Cloudflare-facing hop.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsCollectRequest'
      responses:
        '200':
          description: Analytics batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsCollectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
components:
  securitySchemes:
    IntegrationKeyAuth:
      type: apiKey
      in: header
      name: X-Command-Integration-Key
      description: |
        Server-side integration credential used by the public-site BFF to prove that the site is
        allowed to talk to this Command install.
    CommandSessionAuth:
      type: apiKey
      in: header
      name: X-Command-Session
      description: |
        Opaque end-user session token issued by Command and forwarded by the public-site BFF.
  parameters:
    CommandSessionHeader:
      in: header
      name: X-Command-Session
      required: true
      schema:
        type: string
      description: Opaque end-user session token issued by Command.
    WebsiteSessionHeader:
      in: header
      name: X-Command-Website-Session
      required: true
      schema:
        type: string
      description: Consent-gated first-party analytics session identifier owned by the public-site BFF.
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid integration credential or session token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists or cannot be created in the requested state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Validation failure or unsupported state transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
    AcceptedResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    AnalyticsEventType:
      type: string
      enum: [SESSION_START, PAGE_VIEW, ENGAGEMENT_PING, SESSION_END, WEB_VITAL]
    AnalyticsEvent:
      type: object
      additionalProperties: false
      required: [eventId, eventType, occurredAt]
      properties:
        eventId:
          type: string
        eventType:
          $ref: '#/components/schemas/AnalyticsEventType'
        occurredAt:
          type: string
          format: date-time
        path:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        referer:
          type: string
          nullable: true
        engagedSeconds:
          type: integer
          minimum: 0
          nullable: true
        metricName:
          type: string
          nullable: true
        metricValue:
          type: number
          nullable: true
        utmSource:
          type: string
          nullable: true
        utmMedium:
          type: string
          nullable: true
        utmCampaign:
          type: string
          nullable: true
        utmTerm:
          type: string
          nullable: true
        utmContent:
          type: string
          nullable: true
        gclid:
          type: string
          nullable: true
        fbclid:
          type: string
          nullable: true
        msclkid:
          type: string
          nullable: true
        ttclid:
          type: string
          nullable: true
        raw:
          description: Optional event-specific browser metadata payload.
    AnalyticsCollectRequest:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/AnalyticsEvent'
    AnalyticsCollectResponse:
      type: object
      additionalProperties: false
      required: [ok, sessionId, acceptedEvents, duplicateEvents]
      properties:
        ok:
          type: boolean
          const: true
        sessionId:
          type: string
        acceptedEvents:
          type: integer
          minimum: 0
        duplicateEvents:
          type: integer
          minimum: 0
    ExternalAccount:
      type: object
      additionalProperties: false
      required: [id, brandKey, email, status, emailVerified, createdAt, updatedAt]
      properties:
        id:
          type: string
        brandKey:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, BLOCKED]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
    Session:
      type: object
      additionalProperties: false
      required: [token, expiresAt]
      properties:
        token:
          type: string
          description: Opaque Command session token for BFF forwarding only.
        expiresAt:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          nullable: true
    RegisterResponse:
      type: object
      additionalProperties: false
      required: [ok, verificationRequired]
      properties:
        ok:
          type: boolean
          const: true
        verificationRequired:
          type: boolean
          const: true
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    LoginResponse:
      type: object
      additionalProperties: false
      required: [ok, session, account]
      properties:
        ok:
          type: boolean
          const: true
        session:
          $ref: '#/components/schemas/Session'
        account:
          $ref: '#/components/schemas/ExternalAccount'
    SessionResponse:
      type: object
      additionalProperties: false
      required: [ok, account]
      properties:
        ok:
          type: boolean
          const: true
        account:
          $ref: '#/components/schemas/ExternalAccount'
    VerifyEmailRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
    VerifyEmailResponse:
      type: object
      additionalProperties: false
      required: [ok, verified]
      properties:
        ok:
          type: boolean
          const: true
        verified:
          type: boolean
          const: true
    PasswordForgotRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
    PasswordResetResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    AccountResponse:
      type: object
      additionalProperties: false
      required: [ok, account]
      properties:
        ok:
          type: boolean
          const: true
        account:
          $ref: '#/components/schemas/ExternalAccount'
    AccountUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
    PromptItem:
      type: object
      additionalProperties: false
      required: [id, title, category, content]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        content:
          type: string
    PromptListResponse:
      type: object
      additionalProperties: false
      required: [ok, items]
      properties:
        ok:
          type: boolean
          const: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromptItem'
    GuideListItem:
      type: object
      additionalProperties: false
      required: [id, title, slug, summary, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
        category:
          type: object
          nullable: true
          additionalProperties: false
          required: [id, name, slug]
          properties:
            id:
              type: string
            name:
              type: string
            slug:
              type: string
        tags:
          type: array
          items:
            type: string
          nullable: true
    GuideListResponse:
      type: object
      additionalProperties: false
      required: [ok, items]
      properties:
        ok:
          type: boolean
          const: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/GuideListItem'
    GuideDetail:
      allOf:
        - $ref: '#/components/schemas/GuideListItem'
        - type: object
          additionalProperties: false
          required: [body]
          properties:
            body:
              type: string
    GuideDetailResponse:
      type: object
      additionalProperties: false
      required: [ok, item]
      properties:
        ok:
          type: boolean
          const: true
        item:
          $ref: '#/components/schemas/GuideDetail'
    ScheduleRange:
      type: object
      additionalProperties: false
      required: [from, to]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
    ScheduleSeriesRef:
      type: object
      additionalProperties: false
      required: [id, slug, name]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
    ScheduleOccurrenceRef:
      type: object
      additionalProperties: false
      required: [id, status]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [SCHEDULED, CANCELLED]
    ScheduleResourceRef:
      type: object
      additionalProperties: false
      required: [id, slug, name, type]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [STAGE, FOOD_SPOT, MARKET_SPOT, OTHER]
    ScheduleParticipantRef:
      type: object
      additionalProperties: false
      required: [id, slug, displayName, type]
      properties:
        id:
          type: string
        slug:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum: [ENTERTAINMENT, FOOD_VENDOR, MARKET_VENDOR]
    ScheduleEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - status
        - allDay
        - occursOn
        - timezone
        - start
        - end
        - startsAtMinutes
        - endsAtMinutes
        - timeLabel
        - occurrenceWindowLabel
        - title
        - locationLabel
        - eventSeries
        - occurrence
        - resource
        - participant
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [TIMED_SLOT, FULL_DAY]
        status:
          type: string
          enum: [DRAFT, PUBLISHED, CANCELLED]
        allDay:
          type: boolean
        occursOn:
          type: string
          format: date
        timezone:
          type: string
        start:
          type: string
          description: Local schedule start value. For all-day items this is the occurrence date.
        end:
          type: string
          description: Local schedule end value. For all-day items this is the exclusive next date.
        startsAtMinutes:
          type: integer
        endsAtMinutes:
          type: integer
        timeLabel:
          type: string
        occurrenceWindowLabel:
          type: string
        sequence:
          type: integer
          minimum: 1
          nullable: true
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        locationLabel:
          type: string
        url:
          type: string
          format: uri
          nullable: true
        eventSeries:
          $ref: '#/components/schemas/ScheduleSeriesRef'
        occurrence:
          $ref: '#/components/schemas/ScheduleOccurrenceRef'
        resource:
          $ref: '#/components/schemas/ScheduleResourceRef'
        participant:
          $ref: '#/components/schemas/ScheduleParticipantRef'
    ScheduleCalendarResponse:
      type: object
      additionalProperties: false
      required: [ok, range, items]
      properties:
        ok:
          type: boolean
          const: true
        range:
          $ref: '#/components/schemas/ScheduleRange'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleEntry'
    ScheduleListResponse:
      type: object
      additionalProperties: false
      required: [ok, range, items]
      properties:
        ok:
          type: boolean
          const: true
        range:
          $ref: '#/components/schemas/ScheduleRange'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleEntry'
    ContactRequest:
      type: object
      additionalProperties: false
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        message:
          type: string
    ContactResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
        id:
          type: string
          nullable: true
        notification:
          type: string
          enum: [sent, deferred]
          nullable: true
    ChatMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    ChatLead:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        preferred_contact:
          anyOf:
            - type: string
              enum: [email, phone, text]
            - type: 'null'
    ChatRequest:
      type: object
      additionalProperties: false
      required: [messages]
      properties:
        conversationId:
          type: string
          nullable: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        lead:
          $ref: '#/components/schemas/ChatLead'
        emailed:
          type: boolean
          nullable: true
    ChatResponse:
      type: object
      additionalProperties: false
      required: [ok, reply, lead, emailed]
      properties:
        ok:
          type: boolean
          const: true
        reply:
          type: string
        lead:
          allOf:
            - $ref: '#/components/schemas/ChatLead'
            - type: object
              required: [name, email, phone, company, website, preferred_contact]
        returnId:
          type: string
          nullable: true
        emailed:
          type: boolean
