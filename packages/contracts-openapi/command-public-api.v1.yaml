openapi: 3.1.0
info:
  title: Command Public API
  version: 0.1.0
  summary: Initial public-site integration contract for the reusable Command backoffice.
  description: |
    This is the initial external API contract that brand-specific public websites will consume
    through a server-side BFF/proxy. It is intentionally limited to the current live needs:
    external auth, account access, password reset, partner portal auth/profile/application
    flows, brand-scoped resource feeds, and the current public contact/chat service flows. It
    now also includes consent-gated first-party website analytics ingestion for branded public
    sites.
servers:
  - url: https://command.example.com
    description: Example Command install base URL
tags:
  - name: Auth
    description: External user authentication and session lifecycle
  - name: Account
    description: Authenticated external account profile operations
  - name: Partner Portal
    description: Participant and sponsor portal auth, profile, and per-event application flows
  - name: Runtime
    description: Install-scoped runtime host resolution for website/BFF entrypoints
  - name: Resources
    description: Authenticated brand-scoped prompt and guide feeds
  - name: Scheduling
    description: Integration-authenticated published schedule feeds for public websites
  - name: Services
    description: Public website service flows such as contact and chat lead intake
  - name: Analytics
    description: Consent-gated first-party website analytics ingestion for branded public sites
security:
  - IntegrationKeyAuth: []
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new external account
      description: |
        Creates a brand-scoped external account for the integration's brand context and starts
        the email-verification flow. This endpoint is called by the public-site BFF, not directly
        by the browser. When consent exists, the BFF should also forward the website session
        header so `command` can link the created-signup conversion server-side.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration accepted and verification is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate an external user
      description: |
        Authenticates the external user and returns an opaque Command session token for the BFF to
        store and forward on subsequent requests. The browser should not receive or manage the raw
        Command session token directly. When consent exists, the BFF should also forward the
        website session header so `command` can link the login conversion server-side.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current external session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/session:
    get:
      tags: [Auth]
      summary: Inspect the current external session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify an external account email address
      description: |
        Finalizes the external account email-verification flow. When consent exists, the BFF
        should also forward the website session header so `command` can link the verified-signup
        conversion server-side.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Start password-reset flow
      description: |
        Accepts an email address and triggers the brand-scoped password-reset flow. The response is
        intentionally generic to avoid account enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordForgotRequest'
      responses:
        '202':
          description: Password-reset request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
  /v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Complete password-reset flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/account/me:
    get:
      tags: [Account]
      summary: Fetch the current external account
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current external account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Account]
      summary: Update the current external account
      description: |
        Initial v1 scope is intentionally narrow: display-name updates only. Email change,
        password change, and social-account linking are explicitly deferred.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Updated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/partners/auth/register:
    post:
      tags: [Partner Portal]
      summary: Register a new participant partner portal account
      description: |
        Creates a participant partner account in the integration's brand context and starts the
        email-verification flow. This endpoint is called by the public-site BFF, not directly by
        the browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantPartnerRegisterRequest'
      responses:
        '201':
          description: Registration accepted and verification is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/partners/auth/login:
    post:
      tags: [Partner Portal]
      summary: Authenticate a participant partner portal user
      description: |
        Authenticates the participant partner and returns an opaque Command session token for the
        BFF to store and forward on subsequent requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerLoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/partners/auth/logout:
    post:
      tags: [Partner Portal]
      summary: Invalidate the current participant partner session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/partners/auth/session:
    get:
      tags: [Partner Portal]
      summary: Inspect the current participant partner session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current authenticated participant partner session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/partners/auth/verify-email:
    post:
      tags: [Partner Portal]
      summary: Verify a participant partner email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/partners/profile:
    get:
      tags: [Partner Portal]
      summary: Fetch the current participant partner profile
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current participant partner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantPortalProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Partner Portal]
      summary: Update the current participant partner profile
      description: |
        Updates text/profile metadata only. Image and document uploads are intentionally deferred
        from this wave.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantPortalProfileUpdateRequest'
      responses:
        '200':
          description: Updated participant profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantPortalProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/partners/applications:
    get:
      tags: [Partner Portal]
      summary: List participant partner applications and available events
      description: |
        Returns the current participant partner's applications plus the current brand's active
        events. In v1, all active events for the current brand are application targets.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Participant partner applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerApplicationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Partner Portal]
      summary: Submit a participant partner application for an event
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerApplicationSubmitRequest'
      responses:
        '201':
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerApplicationSubmitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/sponsors/auth/register:
    post:
      tags: [Partner Portal]
      summary: Register a new sponsor portal account
      description: |
        Creates a sponsor account in the integration's brand context and starts the
        email-verification flow. This endpoint is called by the public-site BFF, not directly by
        the browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsorRegisterRequest'
      responses:
        '201':
          description: Registration accepted and verification is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/sponsors/auth/login:
    post:
      tags: [Partner Portal]
      summary: Authenticate a sponsor portal user
      description: |
        Authenticates the sponsor and returns an opaque Command session token for the BFF to
        store and forward on subsequent requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerLoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/sponsors/auth/logout:
    post:
      tags: [Partner Portal]
      summary: Invalidate the current sponsor session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/sponsors/auth/session:
    get:
      tags: [Partner Portal]
      summary: Inspect the current sponsor session
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current authenticated sponsor session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/sponsors/auth/verify-email:
    post:
      tags: [Partner Portal]
      summary: Verify a sponsor email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/sponsors/profile:
    get:
      tags: [Partner Portal]
      summary: Fetch the current sponsor profile
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Current sponsor profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorPortalProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Partner Portal]
      summary: Update the current sponsor profile
      description: |
        Updates text/profile metadata only. Image and document uploads are intentionally deferred
        from this wave.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsorPortalProfileUpdateRequest'
      responses:
        '200':
          description: Updated sponsor profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorPortalProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/sponsors/applications:
    get:
      tags: [Partner Portal]
      summary: List sponsor applications and available events
      description: |
        Returns the current sponsor's applications plus the current brand's active events. In v1,
        all active events for the current brand are application targets.
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      responses:
        '200':
          description: Sponsor applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerApplicationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Partner Portal]
      summary: Submit a sponsor application for an event
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerApplicationSubmitRequest'
      responses:
        '201':
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerApplicationSubmitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/resources/prompts:
    get:
      tags: [Resources]
      summary: List brand-scoped prompt resources
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: category
          schema:
            type: string
          description: Exact category filter
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Prompt feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/resources/guides:
    get:
      tags: [Resources]
      summary: List brand-scoped guide resources
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search query
        - in: query
          name: category
          schema:
            type: string
          description: Exact category filter
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Guide feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/resources/guides/{slug}:
    get:
      tags: [Resources]
      summary: Fetch a single guide by slug
      security:
        - IntegrationKeyAuth: []
          CommandSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/CommandSessionHeader'
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guide detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/schedule/calendar:
    get:
      tags: [Scheduling]
      summary: List published schedule entries for calendar rendering
      description: |
        Returns published schedule entries for the integration's brand context. This endpoint is
        integration-authenticated but does not require an end-user session because the returned
        data is intended for public website rendering.
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Inclusive start date for the requested schedule range.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Inclusive end date for the requested schedule range.
        - in: query
          name: occurrenceDate
          schema:
            type: string
            format: date
          description: Exact occurrence date shortcut.
        - in: query
          name: eventSeries
          schema:
            type: string
          description: Exact event-series slug or name filter.
        - in: query
          name: participantType
          schema:
            type: string
            enum: [ENTERTAINMENT, FOOD_VENDOR, MARKET_VENDOR]
        - in: query
          name: resource
          schema:
            type: string
          description: Exact resource slug or name filter.
        - in: query
          name: location
          schema:
            type: string
          description: Alias for the resource filter.
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [STAGE, FOOD_SPOT, MARKET_SPOT, OTHER]
        - in: query
          name: sequence
          schema:
            type: integer
            minimum: 1
          description: Entertainment sequence filter derived from time order within a resource/day.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across titles, participants, event series, and locations.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 300
      responses:
        '200':
          description: Calendar feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleCalendarResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/schedule/list:
    get:
      tags: [Scheduling]
      summary: List published schedule entries for public listing UIs
      description: |
        Returns published schedule entries in list form for the integration's brand context. This
        endpoint is integration-authenticated but does not require an end-user session.
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Exact occurrence date shortcut.
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Inclusive start date for the requested schedule range.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Inclusive end date for the requested schedule range.
        - in: query
          name: occurrenceDate
          schema:
            type: string
            format: date
          description: Alias for exact occurrence date filtering.
        - in: query
          name: eventSeries
          schema:
            type: string
          description: Exact event-series slug or name filter.
        - in: query
          name: participantType
          schema:
            type: string
            enum: [ENTERTAINMENT, FOOD_VENDOR, MARKET_VENDOR]
        - in: query
          name: resource
          schema:
            type: string
          description: Exact resource slug or name filter.
        - in: query
          name: location
          schema:
            type: string
          description: Alias for the resource filter.
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [STAGE, FOOD_SPOT, MARKET_SPOT, OTHER]
        - in: query
          name: sequence
          schema:
            type: integer
            minimum: 1
          description: Entertainment sequence filter derived from time order within a resource/day.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across titles, participants, event series, and locations.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Schedule listing feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/schedule/feeds/{feedId}:
    get:
      tags: [Scheduling]
      summary: Fetch a configured public schedule feed by feed ID
      description: |
        Returns the active, pre-configured public schedule feed for the integration's brand
        context. The only input is the generated `feedId`. The BFF remains the caller and should
        forward the original client identity so `command` can throttle this endpoint by real
        client IP.
      parameters:
        - in: path
          name: feedId
          required: true
          schema:
            type: string
          description: Generated feed identifier created in Scheduling / Events.
      responses:
        '200':
          description: Schedule feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleFeedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Rate limited
  /v1/contact:
    post:
      tags: [Services]
      summary: Submit a public website contact request
      description: |
        Accepts a public contact form submission, writes lead records, and attempts brand-scoped
        notification delivery. This endpoint is integration-authenticated but does not require an
        end-user session. When consent exists, the BFF should also forward the website session
        header so `command` can link the contact conversion server-side.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '200':
          description: Contact request accepted and notification sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '202':
          description: Contact request accepted but notification deferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/chat:
    post:
      tags: [Services]
      summary: Execute the public website chat flow
      description: |
        Processes the current conversation turn, applies lead-capture rules, and optionally sends
        brand-scoped notification email when enough follow-up data has been collected. This
        endpoint is integration-authenticated but does not require an end-user session. When
        consent exists, the BFF should also forward the website session header so `command` can
        link chat conversions server-side without trusting the browser to declare them.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat turn completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/analytics/consent-notice:
    get:
      tags: [Analytics]
      summary: Fetch the current published analytics consent notice
      description: |
        Returns the current published brand-scoped consent notice for the calling integration.
        The public-site BFF uses this to render the consent banner and tie user consent to the
        published notice version.
      responses:
        '200':
          description: Current published consent notice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsConsentNoticeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/analytics/collect:
    post:
      tags: [Analytics]
      summary: Ingest a consented first-party website analytics batch
      description: |
        Accepts a consented analytics event batch from the public-site BFF. Browsers do not call
        this endpoint directly. The BFF must forward the trusted website session identifier and
        the original client identity captured at the first Cloudflare-facing hop.
      parameters:
        - $ref: '#/components/parameters/WebsiteSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsCollectRequest'
      responses:
        '200':
          description: Analytics batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsCollectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/runtime/host:
    get:
      tags: [Runtime]
      summary: Resolve install-scoped host runtime config
      description: |
        Returns canonical public/admin host routing and allowed-host redirect policy for the
        requested host from the database-backed BrandHost registry. This endpoint is integration-
        authenticated, but intentionally install-scoped rather than brand-scoped because host
        routing must be resolved before brand context exists on the website entrypoint.
      parameters:
        - in: query
          name: host
          required: true
          schema:
            type: string
          description: Hostname to resolve.
      responses:
        '200':
          description: Runtime host config resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHostConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    IntegrationKeyAuth:
      type: apiKey
      in: header
      name: X-Command-Integration-Key
      description: |
        Server-side integration credential used by the public-site BFF to prove that the site is
        allowed to talk to this Command install.
    CommandSessionAuth:
      type: apiKey
      in: header
      name: X-Command-Session
      description: |
        Opaque end-user session token issued by Command and forwarded by the public-site BFF.
  parameters:
    CommandSessionHeader:
      in: header
      name: X-Command-Session
      required: true
      schema:
        type: string
      description: Opaque end-user session token issued by Command.
    WebsiteSessionHeader:
      in: header
      name: X-Command-Website-Session
      required: true
      schema:
        type: string
      description: Consent-gated first-party analytics session identifier owned by the public-site BFF.
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid integration credential or session token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists or cannot be created in the requested state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Validation failure or unsupported state transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
    AcceptedResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    AnalyticsEventType:
      type: string
      enum: [SESSION_START, PAGE_VIEW, ENGAGEMENT_PING, SESSION_END, WEB_VITAL, PERFORMANCE_METRIC]
    AnalyticsEvent:
      type: object
      additionalProperties: false
      required: [eventId, eventType, occurredAt]
      properties:
        eventId:
          type: string
        eventType:
          $ref: '#/components/schemas/AnalyticsEventType'
        occurredAt:
          type: string
          format: date-time
        path:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        referer:
          type: string
          nullable: true
        engagedSeconds:
          type: integer
          minimum: 0
          nullable: true
        metricName:
          type: string
          nullable: true
        metricValue:
          type: number
          nullable: true
        utmSource:
          type: string
          nullable: true
        utmMedium:
          type: string
          nullable: true
        utmCampaign:
          type: string
          nullable: true
        utmTerm:
          type: string
          nullable: true
        utmContent:
          type: string
          nullable: true
        gclid:
          type: string
          nullable: true
        fbclid:
          type: string
          nullable: true
        msclkid:
          type: string
          nullable: true
        ttclid:
          type: string
          nullable: true
        raw:
          description: Optional event-specific browser metadata payload.
    AnalyticsCollectRequest:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/AnalyticsEvent'
    AnalyticsCollectResponse:
      type: object
      additionalProperties: false
      required: [ok, sessionId, acceptedEvents, duplicateEvents]
      properties:
        ok:
          type: boolean
          const: true
        sessionId:
          type: string
        acceptedEvents:
          type: integer
          minimum: 0
        duplicateEvents:
          type: integer
          minimum: 0
    RuntimeBrandResolution:
      type: object
      additionalProperties: false
      required:
        - source
        - brandKey
        - brandName
        - status
        - environment
        - matchedHost
        - canonicalPublicHost
        - canonicalAdminHost
        - apexHost
        - isAdminHost
      properties:
        source:
          type: string
          const: database
        brandId:
          type: string
          nullable: true
        brandKey:
          type: string
        brandName:
          type: string
        status:
          type: string
        environment:
          type: string
          enum: [production, preview]
        matchedHost:
          type: string
        canonicalPublicHost:
          type: string
        canonicalAdminHost:
          type: string
        apexHost:
          type: string
        isAdminHost:
          type: boolean
    RuntimeHostConfig:
      type: object
      additionalProperties: false
      required:
        - requestHost
        - brandKey
        - runtime
        - canonicalPublicHost
        - canonicalAdminHost
        - allowedHosts
        - resolvedFromBrandRegistry
      properties:
        requestHost:
          type: string
        brandKey:
          type: string
          nullable: true
        runtime:
          anyOf:
            - $ref: '#/components/schemas/RuntimeBrandResolution'
            - type: 'null'
        canonicalPublicHost:
          type: string
          nullable: true
        canonicalAdminHost:
          type: string
          nullable: true
        allowedHosts:
          type: array
          items:
            type: string
        resolvedFromBrandRegistry:
          type: boolean
    RuntimeHostConfigResponse:
      type: object
      additionalProperties: false
      required: [ok, config, scope]
      properties:
        ok:
          type: boolean
          const: true
        config:
          $ref: '#/components/schemas/RuntimeHostConfig'
        scope:
          type: object
          additionalProperties: false
          required: [integration, access]
          properties:
            integration:
              type: string
            access:
              type: string
              const: install
    AnalyticsConsentNotice:
      type: object
