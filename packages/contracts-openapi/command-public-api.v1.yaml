    ScheduleEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - status
        - allDay
        - occursOn
        - timezone
        - start
        - end
        - startsAtMinutes
        - endsAtMinutes
        - timeLabel
        - occurrenceWindowLabel
        - title
        - locationLabel
        - eventSeries
        - occurrence
        - resource
        - participant
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [TIMED_SLOT, FULL_DAY]
        status:
          type: string
          enum: [DRAFT, PUBLISHED, CANCELLED]
        allDay:
          type: boolean
        occursOn:
          type: string
          format: date
        timezone:
          type: string
        start:
          type: string
          description: Local schedule start value. For all-day items this is the occurrence date.
        end:
          type: string
          description: Local schedule end value. For all-day items this is the exclusive next date.
        startsAtMinutes:
          type: integer
        endsAtMinutes:
          type: integer
        timeLabel:
          type: string
        occurrenceWindowLabel:
          type: string
        sequence:
          type: integer
          minimum: 1
          nullable: true
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        locationLabel:
          type: string
        url:
          type: string
          format: uri
          nullable: true
        eventSeries:
          $ref: '#/components/schemas/ScheduleSeriesRef'
        occurrence:
          $ref: '#/components/schemas/ScheduleOccurrenceRef'
        resource:
          $ref: '#/components/schemas/ScheduleResourceRef'
